<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library OS | Made by ISUF</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { primary: '#6366f1', darkBg: '#020617', darkCard: '#0f172a' }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; transition: background-color 0.5s ease; }
        .dark body { background-color: #020617; }
        .glass-card { background: white; border-radius: 2.5rem; box-shadow: 0 20px 50px rgba(0,0,0,0.04); }
        .dark .glass-card { background: #0f172a; border: 1px solid rgba(255,255,255,0.05); }
        .tab-content { display: none; opacity: 0; }
        .tab-content.active { display: block; }
        .sidebar-item.active { background: #6366f1; color: white; box-shadow: 0 10px 25px -5px rgba(99, 102, 241, 0.4); }
        .custom-input { background: #fdfdfd; border: 1px solid #f3f4f6; padding: 1.25rem; border-radius: 1.25rem; outline: none; width: 100%; transition: all 0.3s; }
        .dark .custom-input { background: #1e293b; border-color: #334155; color: white; }
        .custom-input:focus { border-color: #6366f1; box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1); }
        .confetti { position: absolute; width: 8px; height: 8px; border-radius: 50%; pointer-events: none; z-index: 100; }
    </style>
</head>
<body>

    <aside id="sidebar" class="fixed left-0 top-0 h-full w-64 p-8 z-50 transition-transform -translate-x-full lg:translate-x-0">
        <div class="flex items-center gap-4 mb-14 px-2">
            <div class="h-12 w-12 bg-indigo-600 rounded-2xl flex items-center justify-center text-white shadow-lg"><i class="fas fa-crown"></i></div>
            <div>
                <p class="text-[10px] uppercase font-bold text-slate-400 leading-none">Developer</p>
                <h1 class="text-xl font-black text-indigo-600 dark:text-indigo-400">made by ISUF</h1>
            </div>
        </div>
        <nav class="space-y-4">
            <button onclick="switchTab('dashboard')" class="sidebar-item w-full flex items-center gap-4 px-6 py-4 rounded-2xl font-bold transition-all text-slate-500 dark:text-slate-400" data-tab="dashboard"><i class="fas fa-th-large"></i> Dashboard</button>
            <button onclick="switchTab('books')" class="sidebar-item w-full flex items-center gap-4 px-6 py-4 rounded-2xl font-bold transition-all text-slate-500 dark:text-slate-400" data-tab="books"><i class="fas fa-book"></i> Manage Books</button>
            <button onclick="switchTab('issue')" class="sidebar-item active w-full flex items-center gap-4 px-6 py-4 rounded-2xl font-bold transition-all" data-tab="issue"><i class="fas fa-exchange-alt"></i> Issue / Return</button>
            <button onclick="switchTab('students')" class="sidebar-item w-full flex items-center gap-4 px-6 py-4 rounded-2xl font-bold transition-all text-slate-500 dark:text-slate-400" data-tab="students"><i class="fas fa-users"></i> Student Database</button>
        </nav>
        <div class="absolute bottom-10 left-8 right-8">
            <button onclick="toggleDarkMode()" class="w-full py-4 bg-white dark:bg-slate-800 rounded-2xl shadow-sm flex items-center justify-center gap-3 font-bold hover:scale-105 transition-all"><i id="theme-icon" class="fas fa-moon"></i> Dark Mode</button>
            <p class="text-center text-[10px] text-slate-400 mt-8 font-bold">ISUF LIBRARY OS v10.0</p>
        </div>
    </aside>

    <main class="lg:ml-64 p-6 md:p-14">
        <header class="flex justify-between items-center mb-12">
            <h2 id="page-title" class="text-4xl font-black text-slate-800 dark:text-white tracking-tight">Issue / Return</h2>
            <button onclick="toggleSidebar()" class="lg:hidden p-3 bg-white dark:bg-slate-800 rounded-2xl shadow-md"><i class="fas fa-bars"></i></button>
        </header>

        <section id="dashboard" class="tab-content">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-8 mb-12">
                <div class="bg-white dark:bg-slate-800 p-8 rounded-[2.5rem] shadow-sm border border-slate-50 dark:border-slate-700">
                    <p class="text-slate-400 text-xs font-bold uppercase mb-2">Total Books</p>
                    <h3 id="stat-books" class="text-4xl font-black">0</h3>
                </div>
                <div class="bg-white dark:bg-slate-800 p-8 rounded-[2.5rem] shadow-sm border border-slate-50 dark:border-slate-700">
                    <p class="text-slate-400 text-xs font-bold uppercase mb-2 text-indigo-500">Issued Books</p>
                    <h3 id="stat-issued" class="text-4xl font-black">0</h3>
                </div>
                <div class="bg-white dark:bg-slate-800 p-8 rounded-[2.5rem] shadow-sm border border-slate-50 dark:border-slate-700">
                    <p class="text-slate-400 text-xs font-bold uppercase mb-2">Students</p>
                    <h3 id="stat-students" class="text-4xl font-black">0</h3>
                </div>
                <div class="bg-white dark:bg-slate-800 p-8 rounded-[2.5rem] shadow-sm border border-slate-50 dark:border-slate-700">
                    <p class="text-slate-400 text-xs font-bold uppercase mb-2">History</p>
                    <h3 id="stat-history" class="text-4xl font-black">0</h3>
                </div>
            </div>
            <div class="bg-white dark:bg-slate-800 p-8 rounded-[2.5rem] shadow-sm"><h4 class="font-bold mb-6 flex items-center gap-2 text-indigo-600"><i class="fas fa-bolt"></i> Recent Activity</h4><div id="logs" class="space-y-3"></div></div>
        </section>

        <section id="books" class="tab-content">
            <div class="flex flex-wrap gap-4 mb-10">
                <input type="text" id="book-search" oninput="renderBooks()" placeholder="Search Book ID or Name..." class="flex-1 custom-input shadow-sm">
                <button onclick="toggleModal('book-modal')" class="px-10 py-5 bg-indigo-600 text-white rounded-[1.5rem] font-black shadow-xl hover:scale-105 transition-all">Add Book</button>
            </div>
            <div id="books-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8"></div>
        </section>

        <section id="issue" class="tab-content active">
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-12">
                <div class="glass-card p-12 flex flex-col gap-8">
                    <h4 class="text-2xl font-black text-indigo-600 flex items-center gap-3"><i class="fas fa-plus-circle text-amber-500"></i> Quick Issue Book</h4>
                    <form onsubmit="handleSmartIssue(event)" class="flex flex-col gap-5">
                        <input type="text" id="iss-book-id" placeholder="Enter Book ID" required class="custom-input">
                        <input type="text" id="iss-student-id" placeholder="Enter Student ID" required class="custom-input">
                        <input type="text" id="iss-student-name" placeholder="Student Name" required class="custom-input">
                        <input type="text" id="iss-student-class" placeholder="Class / Section" required class="custom-input">
                        <button type="submit" class="w-full py-5 bg-indigo-600 text-white rounded-[1.25rem] font-black text-lg shadow-xl hover:bg-indigo-700 transition-all uppercase">Issue Now</button>
                    </form>
                </div>
                <div class="bg-white dark:bg-slate-800 rounded-[2.5rem] overflow-hidden shadow-sm flex flex-col border border-slate-50 dark:border-slate-700">
                    <div class="p-8 bg-indigo-600 text-white font-black text-lg flex justify-between items-center"><span>Currently Issued Books</span><i class="fas fa-exchange-alt"></i></div>
                    <div class="overflow-x-auto"><table class="w-full text-left"><thead class="bg-slate-50 dark:bg-slate-900/50 text-[11px] uppercase text-slate-400 font-black tracking-widest border-b border-slate-100 dark:border-slate-800"><tr><th class="p-6">Book</th><th class="p-6">Issued To</th><th class="p-6 text-right">Action</th></tr></thead><tbody id="issued-list" class="divide-y divide-slate-50 dark:divide-slate-800"></tbody></table></div>
                </div>
            </div>
        </section>

        <section id="students" class="tab-content">
            <div class="bg-white dark:bg-slate-800 rounded-[2.5rem] overflow-hidden shadow-sm border border-slate-50 dark:border-slate-700">
                <table class="w-full text-left text-sm"><thead class="bg-indigo-600 text-white uppercase text-xs tracking-widest font-black"><tr><th class="p-7">ID</th><th class="p-7">Name</th><th class="p-7">Class</th><th class="p-7 text-right">Delete</th></tr></thead><tbody id="student-list" class="divide-y divide-slate-50 dark:divide-slate-800"></tbody></table>
            </div>
        </section>
    </main>

    <div id="book-modal" class="fixed inset-0 bg-black/60 hidden items-center justify-center z-[100] backdrop-blur-sm p-4">
        <div class="bg-white dark:bg-slate-800 max-w-md w-full rounded-[2.5rem] p-10 shadow-2xl scale-0 modal-box">
            <h3 class="text-2xl font-black mb-8 tracking-tight">Inventory Entry</h3>
            <form onsubmit="handleBookAdd(event)" class="space-y-5">
                <input type="text" id="nb-id" placeholder="Book ID" required class="custom-input">
                <input type="text" id="nb-name" placeholder="Book Title" required class="custom-input">
                <input type="text" id="nb-cat" placeholder="Category" class="custom-input">
                <div class="flex gap-4 pt-6"><button type="button" onclick="toggleModal('book-modal')" class="flex-1 font-bold text-slate-400">Cancel</button><button type="submit" class="flex-1 py-5 bg-indigo-600 text-white rounded-2xl font-black shadow-lg">Save Book</button></div>
            </form>
        </div>
    </div>

    <script>
        let db = {
            books: JSON.parse(localStorage.getItem('isuf_v10_books')) || [],
            students: JSON.parse(localStorage.getItem('isuf_v10_students')) || [],
            issued: JSON.parse(localStorage.getItem('isuf_v10_issued')) || [],
            history: JSON.parse(localStorage.getItem('isuf_v10_history')) || [],
            logs: JSON.parse(localStorage.getItem('isuf_v10_logs')) || []
        };

        const sync = () => {
            Object.keys(db).forEach(k => localStorage.setItem('isuf_v10_'+k, JSON.stringify(db[k])));
            updateDashboard();
        };

        const addLog = (msg) => {
            db.logs.unshift({ msg, time: new Date().toLocaleTimeString() });
            db.logs = db.logs.slice(0, 8);
            sync(); renderLogs();
        };

        const godAnimate = {
            switch: (nextId) => {
                const current = document.querySelector('.tab-content.active');
                const next = document.getElementById(nextId);
                if (current === next) return;
                gsap.to(current, { duration: 0.3, opacity: 0, y: 20, onComplete: () => {
                    current.classList.remove('active');
                    next.classList.add('active');
                    gsap.fromTo(next, { opacity: 0, y: -20 }, { duration: 0.5, opacity: 1, y: 0, ease: "back.out(1.7)" });
                }});
            },
            confetti: (x, y) => {
                for (let i = 0; i < 15; i++) {
                    const c = document.createElement('div'); c.className = 'confetti'; document.body.appendChild(c);
                    gsap.set(c, { x: x, y: y, backgroundColor: gsap.utils.random(['#6366f1', '#10b981', '#f59e0b']) });
                    gsap.to(c, { duration: 1, x: x + (Math.random() - 0.5) * 200, y: y - 100, opacity: 0, scale: 0, onComplete: () => c.remove() });
                }
            }
        };

        function switchTab(id) {
            document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active'));
            document.querySelector(`[data-tab="${id}"]`).classList.add('active');
            document.getElementById('page-title').innerText = id === 'issue' ? 'Issue / Return' : id.charAt(0).toUpperCase() + id.slice(1);
            godAnimate.switch(id);
            if(id === 'books') renderBooks();
            if(id === 'issue') renderIssued();
            if(id === 'students') renderStudents();
        }

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('-translate-x-full'); }
        function toggleModal(id) { 
            const m = document.getElementById(id);
            const box = m.querySelector('.modal-box');
            if(m.classList.contains('hidden')) { m.classList.remove('hidden'); m.classList.add('flex'); gsap.to(box, { duration: 0.5, scale: 1, ease: "back.out" }); }
            else { gsap.to(box, { duration: 0.3, scale: 0, onComplete: () => { m.classList.add('hidden'); m.classList.remove('flex'); }}); }
        }

        function handleBookAdd(e) {
            e.preventDefault();
            const id = document.getElementById('nb-id').value.trim();
            if(db.books.some(b => b.id === id)) return alert('Book ID exists!');
            db.books.push({ id, name: document.getElementById('nb-name').value, cat: document.getElementById('nb-cat').value });
            addLog(`Book Added: ${id}`);
            toggleModal('book-modal'); e.target.reset(); renderBooks();
        }

        function renderBooks() {
            const q = document.getElementById('book-search').value.toLowerCase();
            document.getElementById('books-grid').innerHTML = db.books.filter(b => b.id.toLowerCase().includes(q) || b.name.toLowerCase().includes(q)).map(b => `
                <div class="bg-white dark:bg-slate-800 p-7 rounded-[2rem] shadow-sm border border-slate-50 dark:border-slate-700 book-card opacity-0">
                    <h5 class="font-black h-10 line-clamp-2">${b.name}</h5>
                    <p class="text-[10px] text-slate-400 font-mono mt-3 uppercase">ID: ${b.id}</p>
                    <button onclick="deleteBook('${b.id}')" class="mt-4 w-full py-2 bg-red-50 text-red-600 rounded-xl text-[10px] font-black hover:bg-red-600 hover:text-white transition-all">Delete</button>
                </div>
            `).join('');
            gsap.to(".book-card", { duration: 0.5, opacity: 1, y: 0, stagger: 0.05 });
        }

        function deleteBook(id) {
            if(db.issued.some(i => i.bId === id)) return alert('Book is currently issued!');
            if(confirm('Delete book?')) { db.books = db.books.filter(b => b.id !== id); addLog(`Deleted Book: ${id}`); sync(); renderBooks(); }
        }

        function handleSmartIssue(e) {
            e.preventDefault();
            const bId = document.getElementById('iss-book-id').value.trim();
            const sId = document.getElementById('iss-student-id').value.trim();
            const sName = document.getElementById('iss-student-name').value;
            const sClass = document.getElementById('iss-student-class').value;

            const book = db.books.find(b => b.id === bId);
            if(!book) return alert('Book ID not found!');
            if(db.issued.some(i => i.bId === bId)) return alert('Book already issued!');

            const sIdx = db.students.findIndex(s => s.id === sId);
            if(sIdx > -1) { db.students[sIdx] = { id: sId, name: sName, class: sClass }; }
            else { db.students.push({ id: sId, name: sName, class: sClass }); }

            db.issued.push({ bId, bName: book.name, sId, sName, sClass, date: new Date().toLocaleDateString() });
            addLog(`Issued ${bId} to ${sId}`); e.target.reset(); sync(); renderIssued();
        }

        function renderIssued() {
            document.getElementById('issued-list').innerHTML = db.issued.map((i, idx) => `
                <tr><td class="p-6 font-black text-sm">${i.bName}<br><span class="text-[10px] text-slate-400">${i.bId}</span></td>
                <td class="p-6 text-sm">${i.sName}<br><span class="text-[10px] text-indigo-500 font-bold uppercase">${i.sId} | ${i.sClass}</span></td>
                <td class="p-6 text-right"><button onclick="returnBook(${idx}, event)" class="bg-indigo-600 text-white px-5 py-2.5 rounded-xl text-[10px] font-black shadow-lg hover:scale-110 transition-transform">RETURN</button></td></tr>
            `).join('');
        }

        function returnBook(idx, e) {
            const item = db.issued[idx];
            db.history.push({ ...item, returnDate: new Date().toLocaleDateString() });
            db.issued.splice(idx, 1);
            addLog(`Returned: ${item.bId}`); godAnimate.confetti(e.clientX, e.clientY);
            gsap.to(e.target.closest('tr'), { duration: 0.4, opacity: 0, x: 50, onComplete: () => { sync(); renderIssued(); }});
        }

        function renderStudents() {
            document.getElementById('student-list').innerHTML = db.students.map(s => `
                <tr class="hover:bg-slate-50 dark:hover:bg-slate-800/50"><td class="p-7 font-black text-indigo-600 font-mono">${s.id}</td>
                <td class="p-7 font-black">${s.name}</td><td class="p-7 font-bold text-slate-400">${s.class}</td>
                <td class="p-7 text-right"><button onclick="deleteStudent('${s.id}')" class="text-red-500 font-black text-xs hover:scale-110 transition-transform"><i class="fas fa-trash"></i></button></td></tr>
            `).join('');
        }

        function deleteStudent(id) {
            if(db.issued.some(i => i.sId === id)) return alert('Student has a book!');
            if(confirm('Delete student?')) { db.students = db.students.filter(s => s.id !== id); addLog(`Deleted Student: ${id}`); sync(); renderStudents(); }
        }

        function updateDashboard() {
            const up = (id, end) => {
                const el = document.getElementById(id);
                gsap.to({ v: parseInt(el.innerText) || 0 }, { duration: 1.5, v: end, onUpdate: function() { el.innerText = Math.floor(this.targets()[0].v); } });
            };
            up('stat-books', db.books.length); up('stat-issued', db.issued.length); up('stat-students', db.students.length); up('stat-history', db.history.length);
        }

        function renderLogs() { document.getElementById('logs').innerHTML = db.logs.map(l => `<div class="p-4 bg-slate-50 dark:bg-slate-900/50 rounded-2xl flex justify-between text-[11px] font-bold"><span>${l.msg}</span><span class="text-slate-400">${l.time}</span></div>`).join(''); }

        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('isuf_theme', isDark ? 'dark' : 'light');
            document.getElementById('theme-icon').className = isDark ? 'fas fa-sun' : 'fas fa-moon';
        }

        window.onload = () => {
            if(localStorage.getItem('isuf_theme') === 'dark') toggleDarkMode();
            sync(); renderLogs();
            gsap.from("#sidebar", { duration: 1, x: -200, opacity: 0, ease: "power3.out" });
            gsap.from("main", { duration: 1, opacity: 0, delay: 0.3 });
        };
    </script>
</body>
</html>
