<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Library Management Web App</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Animated Gradient Background */
    body {
      background: linear-gradient(-45deg, #e0f7fa, #e3f2fd, #f3e5f5, #fffde7);
      background-size: 400% 400%;
      animation: gradientShift 15s ease infinite;
    }
    @keyframes gradientShift {
      0% {background-position:0% 50%;}
      50% {background-position:100% 50%;}
      100% {background-position:0% 50%;}
    }

    /* Glassmorphism */
    .glass {
      background: rgba(255,255,255,0.6);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.3);
    }

    /* Glow animation */
    .glow { animation: glowPulse 2s infinite alternate; }
    @keyframes glowPulse {
      from { text-shadow: 0 0 5px #6ee7b7; }
      to { text-shadow: 0 0 15px #3b82f6; }
    }

    /* Ripple effect */
    .ripple {
      position: relative;
      overflow: hidden;
    }
    .ripple:after {
      content:"";
      position:absolute;
      background:rgba(255,255,255,0.5);
      border-radius:50%;
      transform:scale(0);
      opacity:0;
      pointer-events:none;
      animation:rippleAnim 0.6s linear;
    }
    @keyframes rippleAnim {
      to { transform:scale(4); opacity:0; }
    }

    /* Dark mode */
    .dark body { background: #1e293b; }
    .dark .glass { background: rgba(30,41,59,0.7); color:white; }
  </style>
</head>
<body class="min-h-screen flex transition-colors duration-500">

  <!-- Sidebar -->
  <aside class="w-64 glass shadow-lg p-6">
    <h1 class="text-2xl font-bold mb-6">Library</h1>
    <nav class="space-y-4">
      <button class="nav-btn ripple w-full text-left p-2 rounded hover:bg-blue-100" data-page="dashboard">Dashboard</button>
      <button class="nav-btn ripple w-full text-left p-2 rounded hover:bg-blue-100" data-page="addBook">Add Book</button>
      <button class="nav-btn ripple w-full text-left p-2 rounded hover:bg-blue-100" data-page="issueBook">Issue Book</button>
      <button class="nav-btn ripple w-full text-left p-2 rounded hover:bg-blue-100" data-page="records">Records</button>
    </nav>
    <button id="toggleTheme" class="mt-6 bg-indigo-500 text-white px-4 py-2 rounded">Toggle Dark/Light</button>
  </aside>

  <!-- Main Content -->
  <main id="mainContent" class="flex-1 p-8 fade-in">
    <!-- Pages injected here -->
  </main>

  <!-- Footer Branding -->
  <footer class="fixed bottom-2 right-2 text-sm glow flex items-center space-x-2">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="gold"><path d="M12 2l3 7h7l-5.5 4.5L18 21l-6-4-6 4 1.5-7.5L2 9h7z"/></svg>
    <span>MADE BY ISUF 👑</span>
  </footer>

  <!-- JavaScript -->
  <script>
    // State
    let books = JSON.parse(localStorage.getItem('books')) || [];
    let issued = JSON.parse(localStorage.getItem('issued')) || [];

    // Save
    function saveData(){
      localStorage.setItem('books', JSON.stringify(books));
      localStorage.setItem('issued', JSON.stringify(issued));
    }

    // Toast
    function showToast(msg,type="success"){
      const t=document.createElement('div');
      t.className=`fixed top-4 right-4 px-4 py-2 rounded shadow-lg ${type==="success"?"bg-green-500":"bg-red-500"} text-white`;
      t.innerText=msg;
      document.body.appendChild(t);
      setTimeout(()=>t.remove(),3000);
    }

    // Page Loader with transition
    function loadPage(page){
      const main=document.getElementById('mainContent');
      main.style.opacity=0;
      setTimeout(()=>{
        main.innerHTML="";
        if(page==="dashboard") renderDashboard(main);
        if(page==="addBook") renderAddBook(main);
        if(page==="issueBook") renderIssueBook(main);
        if(page==="records") renderRecords(main);
        main.style.opacity=1;
      },300);
    }

    // Dashboard
    function renderDashboard(c){
      const total=books.length, issuedCount=issued.length, available=total-issuedCount;
      c.innerHTML=`
        <h2 class="text-3xl font-bold mb-6">Dashboard</h2>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
          ${statCard("Total Books",total,"📚")}
          ${statCard("Issued Books",issuedCount,"✅")}
          ${statCard("Available Books",available,"📖")}
        </div>`;
    }
    function statCard(title,val,icon){
      return `<div class="glass p-6 rounded shadow hover:shadow-xl transition transform hover:-translate-y-1">
        <div class="text-4xl">${icon}</div>
        <h3 class="text-xl font-semibold">${title}</h3>
        <p class="text-2xl font-bold">${val}</p>
      </div>`;
    }

    // Add Book
    function renderAddBook(c){
      c.innerHTML=`
        <h2 class="text-3xl font-bold mb-6">Add Book</h2>
        <form id="addBookForm" class="space-y-4">
          <input type="file" accept="image/*" capture="camera" class="block w-full border p-2 rounded" id="bookImage">
          <input type="text" placeholder="Book Number (required)" class="block w-full border p-2 rounded" id="bookNumber" required>
          <input type="text" placeholder="Book Name" class="block w-full border p-2 rounded" id="bookName">
          <input type="text" placeholder="Book Category" class="block w-full border p-2 rounded" id="bookCategory">
          <button class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600 transition ripple">Save Book</button>
        </form>
        <div id="preview" class="mt-4"></div>`;
      document.getElementById('bookImage').addEventListener('change',e=>{
        const f=e.target.files[0]; if(f){const r=new FileReader(); r.onload=()=>{document.getElementById('preview').innerHTML=`<img src="${r.result}" class="w-32 h-32 object-cover rounded">`;}; r.readAsDataURL(f);}
      });
      document.getElementById('addBookForm').addEventListener('submit',e=>{
        e.preventDefault();
        const num=document.getElementById('bookNumber').value.trim();
        if(!num){showToast("Book Number required","error");return;}
        const name=document.getElementById('bookName').value.trim();
        const cat=document.getElementById('bookCategory').value.trim();
        const img=document.querySelector('#preview img')?.src||"";
        books.push({number:num,name,category:cat,image:img});
        saveData(); showToast("Book added!");
        loadPage("records");
      });
    }

    // Issue Book
    function renderIssueBook(c){
      c.innerHTML=`
        <h2 class="text-3xl font-bold mb-6">Issue Book</h2>
        <div id="issueSteps">
          <div class="
